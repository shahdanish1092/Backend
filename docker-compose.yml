services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=loneliest-voguishly-ivette.ngrok-free.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://loneliest-voguishly-ivette.ngrok-free.dev
      - N8N_PUBLIC_API_DISABLED=false
      - N8N_API_ALLOWED_USERS=*
      - GENERIC_TIMEZONE=Asia/Kolkata
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
    external: true